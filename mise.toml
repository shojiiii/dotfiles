[tools]
node    = "22"       # LTS
python  = "3.12"
go      = "1.25"
java    = "temurin-21"  # default; override per project with .mise.toml
pnpm    = "9"
protobuf      = "latest"   # protoc
protoc-gen-go = "latest"

# CLI tools (migrated from Homebrew)
terraform = "1.8.5"
helm      = "4.1.4"
helmfile  = "1.4.4"
kubectl   = "1.35.4"
deno      = "2.7.12"
gh        = "2.90.0"
jq        = "1.8.1"
yq        = "4.53.2"
act       = "0.2.87"
awscli    = "2.34.31"

# Install extra Java versions (not active by default):
#   mise install java@temurin-17
#   mise install java@temurin-23
# Switch per project: echo '[tools]\njava = "temurin-17"' > .mise.toml
